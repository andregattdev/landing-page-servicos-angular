<mat-toolbar color="primary">
  <div class="container toolbar-content">

<a href="/" class="logo" aria-label="Logo André Gattermeyer">
      <img
        src="/assets/images/logo-andre-gattermeyer-minimalista.png"
        alt="André Gattermeyer Tecnologia e Serviços"
        loading="lazy"
        decoding="async"
        class="logo-img">
    </a>


    <nav class="navegacao-desktop">
      <a mat-button href="#servicos">Serviços</a>

      <a mat-button href="#projetos">Projetos</a>

      <a mat-button href="#features">Soluções</a>

      <a mat-button href="#processo">Processo</a>

      <a mat-button href="#precos">Preços</a>

      <a mat-button href="#faq">Dúvidas</a>

      <a mat-button href="#cta">Contato</a>
    </nav>

    <button
      mat-icon-button
      class="theme-toggle"
      type="button"
      [attr.aria-label]="themeLabel()"
      (click)="toggleTheme()">
      <mat-icon>{{ themeIcon() }}</mat-icon>
    </button>

    <button
      mat-icon-button
      class="navegacao-mobile"
      (click)="menuToggleClick.emit()">
      <mat-icon>menu</mat-icon>
    </button>

  </div>
</mat-toolbar>
