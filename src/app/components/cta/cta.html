<section class="cta-wrapper">
  <div class="container">
    <h2>Vamos Conversar?</h2>
    <p class="subtitulo">Envie-nos uma mensagem e retornaremos em breve.</p>

    <form class="cta-form" (ngSubmit)="enviarFormulario()" #formContato="ngForm">

      <div class="form-group">
        <label for="nome">Seu Nome</label>
        <input
          type="text"
          id="nome"
          name="nome"
          [(ngModel)]="contato.nome"
          required
          #nome="ngModel">

        @if (nome.invalid && (nome.dirty || nome.touched)) {
          <div class="error-message">O nome é obrigatório.</div>
        }
      </div>

      <div class="form-group">
        <label for="email">Seu E-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="contato.email"
          required
          email
          #email="ngModel">

        @if (email.invalid && (email.dirty || email.touched)) {
          <div class="error-message">Por favor, insira um e-mail válido.</div>
        }
      </div>

      <div class="form-group">
        <label for="mensagem">Sua Mensagem</label>
        <textarea required
          id="mensagem"
          name="mensagem"
          rows="5"
          [(ngModel)]="contato.mensagem"></textarea>
      </div>

      <button type="submit" class="cta-botao" [disabled]="formContato.invalid">
        Enviar Mensagem
      </button>
    </form>
  </div>
</section>
